services:
  postgres:
    image: postgres:16-alpine
    container_name: schoollog-attendance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: schoollog
      POSTGRES_PASSWORD: schoollog
      POSTGRES_DB: schoollog_attendance
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoollog -d schoollog_attendance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
